<body>

<div class="header">
  <h1>⚡ 神様アイコン識別ツール</h1>
  <p>カオスゼロナイトメア｜複数枚一括識別</p>
  <p style="font-size:10px; color:#444444; margin-top:4px;">v2.2</p>
</div>

<!-- STEP 1: 画像選択 -->

<div class="card">
  <div class="card-title">STEP 1 ── 画像を選択（複数可）</div>
  <div class="pattern-toggle">
    <button class="pattern-btn active" id="btnAuto"  onclick="setPattern('auto')">🔄 自動判定<br><span style="font-size:10px;opacity:.7;">16:9→P2 / その他→P1</span></button>
    <button class="pattern-btn"        id="btnP2"    onclick="setPattern('p2')">詳細画面<br><span style="font-size:10px;opacity:.7;">パターン2（固定）</span></button>
    <button class="pattern-btn"        id="btnP1"    onclick="setPattern('p1')">切り抜きカード<br><span style="font-size:10px;opacity:.7;">パターン1（固定）</span></button>
  </div>
  <div class="upload-btns">
    <label class="upload-btn">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(event)">
      <span class="upload-btn-icon">🖼️</span>
      <span class="upload-btn-label">カメラロール</span>
    </label>
    <label class="upload-btn">
      <input type="file" id="fileInputCamera" accept="image/*" capture="environment" onchange="handleFiles(event)">
      <span class="upload-btn-icon">📷</span>
      <span class="upload-btn-label">直接撮影</span>
    </label>
  </div>
  <p class="upload-hint">※ショートカットと同じ順番で選択してね（20枚以下推奨）</p>
</div>

<!-- STEP 2: 識別結果 -->

<div class="card" id="resultSection">
  <div class="card-title">STEP 2 ── 識別結果（プルダウンで修正可）</div>
  <div class="result-list" id="resultList"></div>
</div>

<!-- STEP 3: ショートカットテキストと合体 -->

<div class="card" id="mergeSection" style="display:none;">
  <div class="card-title">STEP 3 ── ショートカットテキストと合体</div>
  <label class="upload-btn" style="width:100%; min-height:64px;">
    <input type="file" id="shortcutFile" accept="text/plain,.txt" onchange="loadShortcutFile(event)">

  </label>

    <button class="btn btn-merge" onclick="mergeData()" style="margin-top:10px;">⚡ 合体して出力</button>
  </div>

<div class="card" id="resetSection" style="display:none;">

</div>

<!-- 拡大モーダル -->

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-inner">
    <canvas id="zoomCanvas"></canvas>

<script>
  /* ============================================================
     定数・データ
  ============================================================ */
  const GODS = {
    ディアロス: ['#F3BA88','#D69D73','#E6AA7D','#E7A171','#D18A60','#FDECCA'],
    セクレド:   ['#78DEC1','#757DD2','#5183A3','#6997BF','#6AD0BF','#F3FE7B','#6B9DD0','#C7F38B'],
    キルケン:   ['#E5B1FA','#FEECE8','#F0C9B6','#CCBFFB','#FBE5CB'],
    ニヒルム:   ['#86CDF4','#7BB1DF','#A3E8FD','#447AA5','#629AC9'],
    ヴィトル:   ['#AB9180','#6A5D63','#927D78','#988792','#836D69'],
  };
  const GOD_NAMES = Object.keys(GODS);

  const CROP_P2 = { x1:0.403, x2:0.430, y1:0.301, y2:0.353 };
  const CROP_P1 = { x1:0.11,  x2:0.22,  y1:0.22,  y2:0.31  };

  const hexToRgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const GOD_RGB = {};
  for (const [name, hexes] of Object.entries(GODS)) GOD_RGB[name] = hexes.map(hexToRgb);

  let results = [];
  let patternMode = 'auto'; // 'auto' | 'p2' | 'p1'

  function setPattern(mode) {
    patternMode = mode;
    document.getElementById('btnAuto').classList.toggle('active', mode === 'auto');
    document.getElementById('btnP2').classList.toggle('active',   mode === 'p2');
    document.getElementById('btnP1').classList.toggle('active',   mode === 'p1');
  } // { canvas, winner, scoreDiff }

  /* ============================================================
     画像読み込み・一括処理
  ============================================================ */
  async function handleFiles(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    results = [];
    const resultSection = document.getElementById('resultSection');
    const resultList    = document.getElementById('resultList');

    resultSection.style.display = 'block';
    resultList.innerHTML = `<div class="processing">⏳ ${files.length}枚を処理中...</div>`;

    for (let i = 0; i < files.length; i++) {
      const result = await processFile(files[i], i + 1);
      results.push(result);
    }

    renderResultList();
    document.getElementById('mergeSection').style.display = 'block';
    document.getElementById('resetSection').style.display = 'block';
    document.getElementById('mergeSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function processFile(file, index) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          // アイコン領域をクロップ（パターン2優先）
          const cropKey = patternMode === 'auto'
            ? (detectPattern(img) === 'p2' ? CROP_P2 : CROP_P1)
            : (patternMode === 'p2' ? CROP_P2 : CROP_P1);
          const canvas = cropToCanvas(img, cropKey);
          const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
          const { winner, sorted, scoreDiff } = identifyGod(imageData);
          resolve({ index, canvas, winner, scoreDiff, sorted });
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // 16:9判定（パターン2）かそれ以外（パターン1）
  function detectPattern(img) {
    const ratio = img.naturalWidth / img.naturalHeight;
    return (ratio > 1.6 && ratio < 1.9) ? 'p2' : 'p1';
  }

  function cropToCanvas(img, crop) {
    const W = img.naturalWidth, H = img.naturalHeight;
    const sx = Math.floor(crop.x1 * W);
    const sy = Math.floor(crop.y1 * H);
    const sw = Math.max(1, Math.floor((crop.x2 - crop.x1) * W));
    const sh = Math.max(1, Math.floor((crop.y2 - crop.y1) * H));
    const c = document.createElement('canvas');
    c.width = sw; c.height = sh;
    c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
    return c;
  }

  /* ============================================================
     神様識別（最近傍距離方式）
  ============================================================ */
  function identifyGod(imageData) {
    const pixels = imageData.data;
    const sums = {}, counts = {};
    for (const name of GOD_NAMES) { sums[name] = 0; counts[name] = 0; }

    for (let i = 0; i < pixels.length; i += 4) {
      if (pixels[i+3] < 128) continue;
      const px = [pixels[i], pixels[i+1], pixels[i+2]];
      for (const [name, colors] of Object.entries(GOD_RGB)) {
        let minD = Infinity;
        for (const c of colors) {
          const d = Math.sqrt((px[0]-c[0])**2 + (px[1]-c[1])**2 + (px[2]-c[2])**2);
          if (d < minD) minD = d;
        }
        sums[name] += minD;
        counts[name]++;
      }
    }

    const avgDists = {};
    for (const name of GOD_NAMES) {
      avgDists[name] = counts[name] > 0 ? sums[name] / counts[name] : Infinity;
    }

    const sorted    = Object.entries(avgDists).sort((a,b) => a[1]-b[1]);
    const scoreDiff = sorted[1][1] - sorted[0][1];
    return { winner: sorted[0][0], sorted, scoreDiff };
  }

  /* ============================================================
     結果リスト描画
  ============================================================ */
  function renderResultList() {
    const list = document.getElementById('resultList');
    list.innerHTML = '';

    results.forEach((r, idx) => {
      const isLow = r.scoreDiff < 3.0;
      const div = document.createElement('div');
      div.className = `result-item${isLow ? ' low-conf' : ''}`;

      // プレビューcanvas
      const previewCanvas = document.createElement('canvas');
      previewCanvas.className = 'item-preview';
      previewCanvas.width  = r.canvas.width;
      previewCanvas.height = r.canvas.height;
      previewCanvas.getContext('2d').drawImage(r.canvas, 0, 0);
      previewCanvas.onclick = () => showModal(r.canvas);

      // セレクト
      const select = document.createElement('select');
      select.className = `item-select god-${r.winner}`;
      // 神様5種 + 通常ヒラメキ
      [...GOD_NAMES, '通常ヒラメキ'].forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name === '通常ヒラメキ' ? '🟡 通常ヒラメキ' : name;
        if (name === r.winner) opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => {
        results[idx].winner = select.value;
        select.className = `item-select god-${select.value}`;
      });

      // 信頼度
      const conf = document.createElement('div');
      conf.className = `item-conf${isLow ? ' warn' : ''}`;
      conf.textContent = isLow
        ? `⚠ スコア差${r.scoreDiff.toFixed(2)}（要目視確認）`
        : `✓ スコア差${r.scoreDiff.toFixed(2)}`;

      const body = document.createElement('div');
      body.className = 'item-body';
      body.appendChild(select);
      body.appendChild(conf);

      const num = document.createElement('div');
      num.className = 'item-num';
      num.textContent = r.index;

      div.appendChild(num);
      div.appendChild(previewCanvas);
      div.appendChild(body);
      list.appendChild(div);
    });
  }

  /* ============================================================
     ショートカットファイル読み込み
  ============================================================ */
  let shortcutRawText = '';

  function loadShortcutFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      shortcutRawText = ev.target.result;
      document.getElementById('shortcutFileName').textContent = `📄 ${file.name} を読み込んだよ！`;
      document.getElementById('shortcutLoaded').style.display = 'block';
      document.getElementById('mergeResult').style.display    = 'none';
    };
    reader.readAsText(file, 'UTF-8');
  }

  /* ============================================================
     テキスト合体
  ============================================================ */
  function parseShortcutText(raw) {
    // 「N.\n===\n」を区切りとしてブロック分割
    const blocks = {};
    const parts = raw.split(/(?=^\d+\.\s*$)/m);
    parts.forEach(part => {
      const lines = part.split('\n').map(l => l.trim()).filter(l => l);
      if (!lines.length) return;
      const numMatch = lines[0].match(/^(\d+)\.$$/);
      if (!numMatch) return;
      const num = parseInt(numMatch[1]);
      // ===の次から本文
      const sepIdx = lines.indexOf('===');
      const body = sepIdx >= 0 ? lines.slice(sepIdx + 1) : lines.slice(1);
      blocks[num] = body;
    });
    return blocks;
  }

  function isNoiseChar(ch) {
    // ひらがな・カタカナ・漢字・英数字・一般的な記号以外 = ノイズ文字
    return !/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEFa-zA-Z0-9（）「」【】［］\[\]()、。・＋\-!！?？0-9０-９]/.test(ch);
  }

  function extractGodEffect(lines) {
    if (!lines.length) return { mainLines: lines, godEffect: null };
    const last = lines[lines.length - 1];
    if (last && last.length > 1 && isNoiseChar(last[0])) {
      return {
        mainLines: lines.slice(0, -1),
        godEffect: last.slice(1).trim()
      };
    }
    return { mainLines: lines, godEffect: null };
  }

  function mergeData() {
    const raw = shortcutRawText.trim();
    if (!raw) { alert('テキストファイルを先にアップロードしてね！'); return; }

    const blocks = parseShortcutText(raw);
    const lines = [];

    results.forEach(r => {
      const body = blocks[r.index];
      const godName = r.winner === '通常ヒラメキ' ? '通常ヒラメキ' : r.winner;

      if (!body || !body.length) {
        lines.push(`【${godName}】`);
        lines.push('（テキストなし）');
        lines.push('---');
        return;
      }

      const cardName = body[0] || '';
      const cardType = body[1] || '';
      const { mainLines, godEffect } = extractGodEffect(body.slice(2));

      lines.push(`【${godName}】`);
      lines.push(`${cardName} / ${cardType}`);
      mainLines.forEach(l => lines.push(l));
      if (godEffect) lines.push(`→ ${godEffect}`);
      lines.push('---');
    });

    const merged = lines.join('\n');
    document.getElementById('mergePreview').textContent = merged;
    document.getElementById('mergeResult').style.display = 'block';
    document.getElementById('mergeResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyMerged() {
    const text = document.getElementById('mergePreview').textContent;
    writeToClipboard(text, 'mergeCopyBtn', '📋 コピー');
  }

  function saveMerged() {
    const text = document.getElementById('mergePreview').textContent;
    downloadText(text, '合体結果.txt');
  }

  /* ============================================================
     共通ユーティリティ
  ============================================================ */
  function writeToClipboard(text, btnId, defaultLabel) {
    navigator.clipboard.writeText(text).then(() => {
      flashBtn(btnId, '✅ コピーしました！', defaultLabel);
    }).catch(() => {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      flashBtn(btnId, '✅ コピーしました！', defaultLabel);
    });
  }

  function flashBtn(btnId, msg, defaultLabel) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = msg;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = defaultLabel;
      btn.classList.remove('copied');
    }, 2000);
  }

  function downloadText(text, filename) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    // iOS Safari対応：Web Share APIを優先
    if (navigator.share && navigator.canShare) {
      const file = new File([blob], filename, { type: 'text/plain' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: filename })
          .catch(e => { if (e.name !== 'AbortError') fallbackDownload(blob, filename); });
        return;
      }
    }
    fallbackDownload(blob, filename);
  }

  function fallbackDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ============================================================
     リセット
  ============================================================ */
  function resetTool() {
    results = [];
    shortcutRawText = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInputCamera').value = '';
    document.getElementById('shortcutFile').value = '';
    document.getElementById('resultSection').style.display  = 'none';
    document.getElementById('mergeSection').style.display   = 'none';
    document.getElementById('resetSection').style.display   = 'none';
    document.getElementById('mergeResult').style.display    = 'none';
    document.getElementById('shortcutLoaded').style.display = 'none';
    document.getElementById('resultList').innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ============================================================
     拡大モーダル
  ============================================================ */
  function showModal(srcCanvas) {
    const zoom = document.getElementById('zoomCanvas');
    zoom.width  = srcCanvas.width;
    zoom.height = srcCanvas.height;
    zoom.getContext('2d').drawImage(srcCanvas, 0, 0);
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
