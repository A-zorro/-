<body>

<h1>🔬 OCR精度テスト</h1>
<p class="sub">Tesseract.js 日本語認識テスト｜カオゼロ</p>

<!-- STEP 1: 入力モード -->

<div class="card">
  <div class="card-title">STEP 1 ── 入力モード</div>
  <div class="mode-group">
    <button class="mode-btn active" id="btnP2" onclick="setInputMode('p2')">パターン2<br><span style="font-size:10px;opacity:.7;">詳細画面スクショ</span></button>
    <button class="mode-btn" id="btnP1" onclick="setInputMode('p1')">パターン1<br><span style="font-size:10px;opacity:.7;">カード切り出し済み</span></button>
  </div>
  <div class="upload-btns">
    <label class="upload-btn">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
      <span class="upload-btn-icon">🖼️</span>
      <span>カメラロール</span>
    </label>
    <label class="upload-btn">
      <input type="file" id="fileInputCam" accept="image/*" capture="environment" onchange="handleFile(event)">
      <span class="upload-btn-icon">📷</span>
      <span>直接撮影</span>
    </label>
  </div>

  <!-- プレビュー -->

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-label">📐 切り出しプレビュー</div>
    <div class="crops-grid">
      <div class="crop-item">
        <canvas id="cropFull"></canvas>
        <div class="crop-item-label">カード全体</div>
      </div>
      <div class="crop-item">
        <canvas id="cropName"></canvas>
        <div class="crop-item-label">カード名エリア</div>
      </div>
      <div class="crop-item">
        <canvas id="cropEffect"></canvas>
        <div class="crop-item-label">効果テキストエリア</div>
      </div>
      <div class="crop-item">
        <canvas id="cropGod"></canvas>
        <div class="crop-item-label">神ヒラメキエリア</div>
      </div>
    </div>
    <button class="btn btn-run" onclick="runOCR()">▶ OCR実行</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">読み込み中...</div>
    </div>
  </div>
</div>

<!-- 結果 -->

<div class="card" id="resultCard">
  <div class="card-title">STEP 2 ── OCR結果</div>

  <div class="result-block">
    <div class="result-block-title">📛 カード名</div>
    <div class="result-text" id="resultName">—</div>
    <div class="confidence-line" id="confName"></div>
  </div>

  <div class="result-block">
    <div class="result-block-title">📝 効果テキスト</div>
    <div class="result-text" id="resultEffect">—</div>
    <div class="confidence-line" id="confEffect"></div>
  </div>

  <div class="result-block">
    <div class="result-block-title">⚡ 神ヒラメキ追加効果</div>
    <div class="result-text" id="resultGod">—</div>
    <div class="confidence-line" id="confGod"></div>
  </div>
</div>

<script>
  /* ============================================================
     座標定義
     パターン2の場合：まずカード全体を切り出し（x:37.6〜62.4%, y:16.9〜83.1%）
     その後カード内の各領域を切り出す（カード全体基準の相対座標）
     パターン1の場合：画像がカード全体なのでそのまま各領域を切り出す

     ※ カード内部の相対座標はOCRテスト後に調整する暫定値
  ============================================================ */
  const CARD_CROP_P2 = { x1: 0.376, x2: 0.624, y1: 0.169, y2: 0.831 };

  // カード全体基準の相対座標（暫定・テスト後に調整）
  const REGIONS = {
    name:   { x1: 0.25, x2: 0.95, y1: 0.04, y2: 0.16 },  // カード名
    effect: { x1: 0.05, x2: 0.95, y1: 0.55, y2: 0.82 },  // 効果テキスト
    god:    { x1: 0.05, x2: 0.95, y1: 0.82, y2: 0.97 },  // 神ヒラメキ追加効果
  };

  let inputMode = 'p2';
  let cardCanvas = null; // カード全体のcanvas

  function setInputMode(m) {
    inputMode = m;
    document.getElementById('btnP2').classList.toggle('active', m === 'p2');
    document.getElementById('btnP1').classList.toggle('active', m === 'p1');
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        if (inputMode === 'p2') {
          // パターン2：まずカード全体を切り出す
          cardCanvas = cropToNewCanvas(img, CARD_CROP_P2, img.naturalWidth, img.naturalHeight);
        } else {
          // パターン1：画像そのものがカード
          cardCanvas = imageToCanvas(img);
        }
        // 各領域のプレビュー
        drawRegionPreview(cardCanvas, 'cropFull',   { x1:0, x2:1, y1:0, y2:1 });
        drawRegionPreview(cardCanvas, 'cropName',   REGIONS.name);
        drawRegionPreview(cardCanvas, 'cropEffect', REGIONS.effect);
        drawRegionPreview(cardCanvas, 'cropGod',    REGIONS.god);

        document.getElementById('previewWrap').classList.add('show');
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('progressWrap').classList.remove('show');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function cropToNewCanvas(img, crop, W, H) {
    const sx = Math.floor(crop.x1 * W);
    const sy = Math.floor(crop.y1 * H);
    const sw = Math.floor((crop.x2 - crop.x1) * W);
    const sh = Math.floor((crop.y2 - crop.y1) * H);
    const c = document.createElement('canvas');
    c.width = sw; c.height = sh;
    c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
    return c;
  }

  function imageToCanvas(img) {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    return c;
  }

  function drawRegionPreview(srcCanvas, targetId, region) {
    const W = srcCanvas.width, H = srcCanvas.height;
    const sx = Math.floor(region.x1 * W);
    const sy = Math.floor(region.y1 * H);
    const sw = Math.floor((region.x2 - region.x1) * W);
    const sh = Math.floor((region.y2 - region.y1) * H);
    const dst = document.getElementById(targetId);
    dst.width = sw || 1; dst.height = sh || 1;
    dst.getContext('2d').drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
  }

  function cropCanvasRegion(srcCanvas, region) {
    const W = srcCanvas.width, H = srcCanvas.height;
    const sx = Math.floor(region.x1 * W);
    const sy = Math.floor(region.y1 * H);
    const sw = Math.floor((region.x2 - region.x1) * W);
    const sh = Math.floor((region.y2 - region.y1) * H);
    const c = document.createElement('canvas');
    c.width = sw || 1; c.height = sh || 1;
    c.getContext('2d').drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
    return c;
  }

  /* ============================================================
     OCR実行
  ============================================================ */
  async function runOCR() {
    if (!cardCanvas) return;

    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const resultCard   = document.getElementById('resultCard');

    progressWrap.classList.add('show');
    resultCard.style.display = 'none';

    const worker = await Tesseract.createWorker('jpn', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          progressBar.style.width = pct + '%';
          progressText.textContent = `認識中... ${pct}%`;
        } else {
          progressText.textContent = m.status;
        }
      }
    });

    const regions = [
      { key: 'name',   label: 'カード名',       region: REGIONS.name,   resultId: 'resultName',   confId: 'confName'   },
      { key: 'effect', label: '効果テキスト',   region: REGIONS.effect, resultId: 'resultEffect', confId: 'confEffect' },
      { key: 'god',    label: '神ヒラメキ',     region: REGIONS.god,    resultId: 'resultGod',    confId: 'confGod'    },
    ];

    resultCard.style.display = 'block';

    for (let i = 0; i < regions.length; i++) {
      const { label, region, resultId, confId } = regions[i];
      progressText.textContent = `${label} を認識中...`;
      progressBar.style.width = (i / regions.length * 100) + '%';

      const regionCanvas = cropCanvasRegion(cardCanvas, region);
      const { data } = await worker.recognize(regionCanvas);

      const text = data.text.trim();
      const conf = Math.round(data.confidence);

      const el = document.getElementById(resultId);
      if (text) {
        el.textContent = text;
        el.classList.remove('empty');
      } else {
        el.textContent = '（認識できなかったよ）';
        el.classList.add('empty');
      }
      document.getElementById(confId).textContent = `信頼度スコア：${conf}%`;
    }

    progressBar.style.width = '100%';
    progressText.textContent = '完了！';
    await worker.terminate();

    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>

</body>
</html>
